name: Publicar en Instagram y Facebook

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'content/pending/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Publicar en Instagram + Facebook y Commitar
        shell: bash
        env:
          TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          FB_PAGE_ID: "1073392185865577"
        run: |
          set -x
          mkdir -p content/published
          BASE=https://raw.githubusercontent.com/santiago2009edu/nexoia-content/main/assets

          img_for() {
            local id="$1"
            local tipo="${id%%-*}"
            local num="${id##*-}"
            local fallback
            case "$tipo" in
              post)     fallback="$BASE/post-001.jpg" ;;
              carrusel) fallback="$BASE/carrusel-001-slide-1.jpg" ;;
              story)    fallback="$BASE/story-001.jpg" ;;
              reel)     fallback="$BASE/reel-001.jpg" ;;
              *)        fallback="$BASE/post-001.jpg" ;;
            esac
            local wanted="$BASE/${id}.jpg"
            if curl -sf -o /dev/null "$wanted"; then
              echo "$wanted"
            else
              echo "$fallback"
            fi
          }

          for f in content/pending/*.json; do
            [ -f "$f" ] || continue
            s=$(jq -r '.estado' "$f") && ([ "$s" = "approved" ] || [ "$s" = "pending" ]) || continue
            if [ "$s" = "pending" ]; then jq '.estado = "approved"' "$f" > /tmp/tmp.json && mv /tmp/tmp.json "$f"; fi
            id=$(jq -r '.id' "$f")
            echo "=== $id ==="
            if [ -z "$TOKEN" ]; then echo "No TOKEN"; exit 1; fi
            url=$(img_for "$id")
            jq --arg u "$url" '.image_url = $u' "$f" > /tmp/tmp.json && mv /tmp/tmp.json "$f"
            ig=$(jq -r '.instagram_id // ""' "$f")
            cat=$(jq -r '.contenido.caption // ""' "$f")
            htg=$(jq -r '.contenido.hashtags // [] | join(" ")' "$f")
            cap=$(printf "%s\n\n%s" "$cat" "$htg")

            jq -n --arg c "$cap" --arg u "$url" --arg t "$TOKEN" '{caption:$c, media_type:"IMAGE", image_url:$u, access_token:$t}' \
              | curl -s -X POST "https://graph.facebook.com/v22.0/17841439116274856/media" -d @- > /tmp/ig_resp.json
            ig_id=$(jq -r '.id // empty' /tmp/ig_resp.json)
            echo "Instagram container: $(cat /tmp/ig_resp.json)"
            if [ -n "$ig_id" ] && [ "$ig_id" != "null" ]; then
              sleep 3
              jq -n --arg c "$ig_id" --arg t "$TOKEN" '{creation_id:$c, access_token:$t}' \
                | curl -s -X POST "https://graph.facebook.com/v22.0/17841439116274856/media_publish" -d @- > /tmp/ig_pub.json
              echo "Instagram publish: $(cat /tmp/ig_pub.json)"
            fi

            fb_msg=$(printf "%s\n\n%s\n🔗 https://nexoia-agency.github.io" "$cat" "$htg")
            jq -n --arg u "$url" --arg m "$fb_msg" --arg t "$TOKEN" '{url:$u, message:$m, access_token:$t}' \
              | curl -s -X POST "https://graph.facebook.com/v22.0/${FB_PAGE_ID}/photos" -d @- > /tmp/fb_resp.json
            echo "Facebook photo: $(cat /tmp/fb_resp.json)"

            mv "$f" "content/published/$id.json"
          done
          git config user.name "NexoIA Bot"
          git config user.email "bot@nexoia.cali"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/santiago2009edu/nexoia-content
          git add -A
          git status
          git diff --staged --quiet || (git commit -m "Publicado automáticamente" && git pull --rebase && git push)

      - name: Notificar error
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Workflow fallido. Logs:"
          echo "https://github.com/santiago2009edu/nexoia-content/actions"

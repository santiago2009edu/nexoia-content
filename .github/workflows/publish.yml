name: Publicar en Instagram y Facebook

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      ig_token:
        description: 'Token de Instagram (opcional - si no se usa, toma el secreto)'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'content/pending/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Publicar en Instagram + Facebook y Commitar
        shell: bash
        env:
          TOKEN: ${{ inputs.ig_token || secrets.INSTAGRAM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          FB_PAGE_ID: "1073392185865577"
        run: |
          set -e
          mkdir -p content/published
          BASE=https://raw.githubusercontent.com/santiago2009edu/nexoia-content/main/assets

          img_for() {
            local id="$1"
            local tipo="${id%%-*}"
            local num="${id##*-}"
            local fallback
            case "$tipo" in
              post)     fallback="$BASE/post-001.jpg" ;;
              carrusel) fallback="$BASE/carrusel-001-slide-1.jpg" ;;
              story)    fallback="$BASE/story-001.jpg" ;;
              reel)     fallback="$BASE/reel-001.jpg" ;;
              *)        fallback="$BASE/post-001.jpg" ;;
            esac
            local wanted="$BASE/${id}.jpg"
            if curl -sf -o /dev/null "$wanted"; then
              echo "$wanted"
            else
              echo "$fallback"
            fi
          }

          FAILED=0

          for f in content/pending/*.json; do
            [ -f "$f" ] || continue
            s=$(jq -r '.estado' "$f") && ([ "$s" = "approved" ] || [ "$s" = "pending" ]) || continue
            if [ "$s" = "pending" ]; then jq '.estado = "approved"' "$f" > /tmp/tmp.json && mv /tmp/tmp.json "$f"; fi
            id=$(jq -r '.id' "$f")
            echo "=== $id ==="
            if [ -z "$TOKEN" ]; then echo "No TOKEN"; exit 1; fi
            url=$(img_for "$id")
            jq --arg u "$url" '.image_url = $u' "$f" > /tmp/tmp.json && mv /tmp/tmp.json "$f"
            cat=$(jq -r '.contenido.caption // ""' "$f")
            htg=$(jq -r '.contenido.hashtags // [] | join(" ")' "$f")
            cap=$(printf "%s\n\n%s" "$cat" "$htg")

            echo "--- Creando container IG ---"
            CREATE_RESP=$(jq -n --arg c "$cap" --arg u "$url" --arg t "$TOKEN" '{caption:$c, media_type:"IMAGE", image_url:$u, access_token:$t}' \
              | curl -sf -X POST "https://graph.facebook.com/v22.0/17841439116274856/media" -d @- 2>&1) || { echo "ERROR al crear container: $CREATE_RESP"; FAILED=$((FAILED+1)); continue; }
            echo "Response: $CREATE_RESP"
            ig_id=$(echo "$CREATE_RESP" | jq -r '.id // empty')
            if [ -z "$ig_id" ] || [ "$ig_id" = "null" ]; then
              echo "ERROR: no se obtuvo ig_id. Respuesta: $CREATE_RESP"
              FAILED=$((FAILED+1))
              continue
            fi

            echo "--- Publicando container IG ($ig_id) ---"
            sleep 3
            PUB_RESP=$(jq -n --arg c "$ig_id" --arg t "$TOKEN" '{creation_id:$c, access_token:$t}' \
              | curl -sf -X POST "https://graph.facebook.com/v22.0/17841439116274856/media_publish" -d @- 2>&1) || { echo "ERROR al publicar en IG: $PUB_RESP"; FAILED=$((FAILED+1)); continue; }
            echo "Publish response: $PUB_RESP"

            echo "--- Publicando en Facebook ---"
            fb_msg=$(printf "%s\n\n%s\n🔗 https://nexoia-agency.github.io" "$cat" "$htg")
            FB_RESP=$(jq -n --arg u "$url" --arg m "$fb_msg" --arg t "$TOKEN" '{url:$u, message:$m, access_token:$t}' \
              | curl -sf -X POST "https://graph.facebook.com/v22.0/${FB_PAGE_ID}/photos" -d @- 2>&1) || { echo "ERROR al publicar en FB: $FB_RESP"; }
            echo "Facebook response: $FB_RESP"

            mv "$f" "content/published/$id.json"
            echo "=== $id COMPLETADO ==="
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "WARNING: $FAILED posts fallaron"
          fi

          git config user.name "NexoIA Bot"
          git config user.email "bot@nexoia.cali"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/santiago2009edu/nexoia-content
          git add -A
          git status
          git diff --staged --quiet || (git commit -m "Publicado automáticamente" && git pull --rebase && git push)

      - name: Notificar error
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Workflow fallido. Logs:"
          echo "https://github.com/santiago2009edu/nexoia-content/actions"

name: Publicar en Instagram

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'content/pending/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Publicar y Commitar
        shell: bash
        env:
          TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
        run: |
          set -x
          mkdir -p content/published
          for f in content/pending/*.json; do
            [ -f "$f" ] || continue
            s=$(jq -r '.estado' "$f") && [ "$s" = "approved" ] || continue
            id=$(jq -r '.id' "$f")
            echo "=== $id ==="
            if [ -z "$TOKEN" ]; then echo "No TOKEN"; exit 1; fi
            url=$(jq -r '.image_url // empty' "$f")
            cat=$(jq -r '.contenido.caption // ""' "$f")
            htg=$(jq -r '.contenido.hashtags // [] | join(" ")' "$f")
            cap=$(printf "%s\n\n%s" "$cat" "$htg")
            jq -n --arg c "$cap" --arg u "$url" --arg t "$TOKEN" '{caption:$c, media_type:"IMAGE", image_url:$u, access_token:$t}' | curl -s -X POST "https://graph.facebook.com/v22.0/17841439116274856/media" -d @- > /tmp/resp.json
            cid=$(jq -r '.id // empty' /tmp/resp.json 2>/dev/null || echo "")
            if [ -n "$cid" ]; then
              sleep 2
              jq -n --arg c "$cid" --arg t "$TOKEN" '{creation_id:$c, access_token:$t}' | curl -s -X POST "https://graph.facebook.com/v22.0/17841439116274856/media_publish" -d @-
            fi
            mv "$f" "content/published/$id.json"
          done
          git config user.name "Bot"
          git config user.email "bot@nexoia.cali"
          git add -A
          git diff --staged --quiet || (git commit -m "Publicado" && git pull --rebase && git push)

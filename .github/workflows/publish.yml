name: Publicar en Instagram

on:
  push:
    branches: [main]
    paths:
      - 'content/pending/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Procesar y publicar contenido aprobado
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          IG_USER_ID: "17841439116274856"
        run: |
          for file in content/pending/*.json; do
            [ -f "$file" ] || continue
            estado=$(jq -r '.estado' "$file")
            [ "$estado" = "approved" ] || continue

            id=$(jq -r '.id' "$file")
            tipo=$(jq -r '.tipo' "$file")
            caption=$(jq -r '.contenido.caption' "$file")
            hashtags=$(jq -r '.contenido.hashtags | join(" ")' "$file")
            caption_full="$caption\n\n$hashtags"

            echo "📤 Publicando $tipo: $id"

            if [ "$tipo" = "post" ] || [ "$tipo" = "carrusel" ]; then
              # Crear container en Instagram
              CREATE_RESP=$(curl -s -X POST "https://graph.facebook.com/v22.0/$IG_USER_ID/media" \
                -d "caption=$caption_full" \
                -d "media_type=IMAGE" \
                -d "image_url=https://santiago2009edu.github.io/nexoia-content/assets/placeholder.jpg" \
                -d "access_token=$IG_TOKEN")
              echo "Container: $CREATE_RESP"
            fi

            # Mover a published
            cp "$file" "content/published/$id.json"
            echo "✅ $id publicado"
          done

      - name: Commit cambios
        run: |
          git config user.name "NexoIA Bot"
          git config user.email "nexoia.cali@gmail.com"
          git add content/published/
          git diff --staged --quiet || git commit -m "📸 Contenido publicado en @nexoia_cali"
          git push

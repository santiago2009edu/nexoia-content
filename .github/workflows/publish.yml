name: Publicar contenido aprobado

on:
  push:
    branches: [main]
    paths:
      - 'content/pending/**'

jobs:
  process_approved:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Mover contenido aprobado a published/
        run: |
          for file in content/pending/*.json; do
            [ -f "$file" ] || continue
            estado=$(jq -r '.estado' "$file")
            if [ "$estado" = "approved" ]; then
              id=$(jq -r '.id' "$file")
              tipo=$(jq -r '.tipo' "$file")
              echo "✅ Publicando: $tipo - $id"
              cp "$file" "content/published/$id.json"
            fi
          done

      - name: Commit cambios
        run: |
          git config user.name "NexoIA Bot"
          git config user.email "nexoia.cali@gmail.com"
          git add content/published/
          git diff --staged --quiet || git commit -m "📸 Contenido marcado como publicado"
          git push
